<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner Sheet</title>

<style>
body{font-family:Arial;background:#f3f4f6;margin:20px;}
table{border-collapse:collapse;width:100%;background:white;}
td,th{border:1px solid #ddd;padding:8px;text-align:left;}
th{background:#f1f1f1;}
button{padding:10px;margin:10px 6px 10px 0;font-size:16px;}
input{padding:10px;font-size:16px;width:300px;}
.small{font-size:13px;color:#555;margin-top:6px;}
</style>
</head>

<body>

<h2>Scanner Sheet</h2>

<input id="scanInput" placeholder="scan here" autocomplete="off" autocapitalize="off" spellcheck="false">
<br>

<button onclick="clearAll()">Clear All</button>
<button onclick="download()">Download Excel (CSV)</button>
<button onclick="exportJSON()">Export JSON</button>
<button onclick="importJSON()">Import JSON</button>
<div class="small">
Export/Import מיועד לסנכרון בין טלפון↔מחשב (כי localStorage לא עובר בין מכשירים).
</div>

<h3>Main Table</h3>
<table id="main">
  <thead>
    <tr>
      <th>Code</th>
      <th>Duplicate</th>
      <th>Suffix</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<h3>Suffix Table</h3>
<table id="suffix"></table>

<script>
/*** CONFIG ***/
const MIN_LEN = 9;
const MAX_LEN = 12;      // לפי מה שאמרת: 9–12 (יש גם 10/11/12 ורק קוד אחד של 9)
const END_DELAY = 260;

/*** STATE ***/
// all scans in chronological order (first scan = index 1 => A1)
let history = []; // [{ code, suffix }]
// unique view keyed by code
let byCode = {};  // code -> { code, suffix, occ: [1,3,7] }

/*** DOM ***/
const input = document.getElementById("scanInput");
let timer = null;
let lastValue = "";

/*** BEEPS ***/
function beep(freq, dur){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = freq;
    gain.gain.value = 0.08;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur);
    osc.onended = () => ctx.close();
  }catch(e){}
}
function beepOk(){ beep(900, 0.09); }
function beepDuplicate(){ beep(200, 0.22); }

/*** HELPERS ***/
function normalize(code){
  return (code || "").trim().replace(/\s+/g, "").toUpperCase();
}

function getSuffix(code){
  // RD stays RD
  if(code.endsWith("RD")) return "RD";

  // RA without number → treat as RA1
  if(code.endsWith("RA")) return "RA1";

  // normal suffix like MR1 RB3
  const s = code.slice(-3);
  if(/^[A-Z]{2}[0-9]$/.test(s)) return s;

  return "";
}

// strict-ish validation to block partial scans
function valid(code){
  if(code.length < MIN_LEN || code.length > MAX_LEN) return false;
  if(!/^[A-Z0-9]+$/.test(code)) return false;

  // must have a recognized suffix, otherwise it's probably a partial scan
  const suffix = getSuffix(code);
  if(!suffix) return false;

  return true;
}

function buildDuplicateText(occ){
  // occ = [1,2,5] => "exists in A1, A2, A5"
  if(!occ || occ.length <= 1) return "";
  return "exists in " + occ.map(n => "A" + n).join(", ");
}

/*** CORE ***/
function processScan(raw){
  const code = normalize(raw);
  if(!valid(code)) return;

  const suffix = getSuffix(code);

  // add to chronological history
  history.push({ code, suffix });
  const scanIndex = history.length; // 1-based for A1, A2...

  // update unique store
  const existed = !!byCode[code];
  if(!byCode[code]){
    byCode[code] = { code, suffix, occ: [scanIndex] };
  }else{
    byCode[code].occ.push(scanIndex);
  }

  render();
  save();

  if(existed) beepDuplicate();
  else beepOk();
}

/*** INPUT CAPTURE (NO ENTER) ***/
input.addEventListener("input", () => {
  lastValue = input.value;

  clearTimeout(timer);
  timer = setTimeout(() => {
    if(input.value !== lastValue) return;

    const v = input.value;
    input.value = "";
    lastValue = "";
    processScan(v);
  }, END_DELAY);
});

// If Enter happens sometimes
input.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    clearTimeout(timer);
    const v = input.value;
    input.value = "";
    lastValue = "";
    processScan(v);
  }
});

/*** RENDER ***/
function render(){
  const tbody = document.querySelector("#main tbody");
  tbody.innerHTML = "";

  // show unique codes ordered by "most recently scanned"
  // i.e. sort by last occurrence descending
  const uniqueList = Object.values(byCode).sort((a,b) => {
    const al = a.occ[a.occ.length - 1];
    const bl = b.occ[b.occ.length - 1];
    return bl - al;
  });

  uniqueList.forEach(r => {
    const tr = document.createElement("tr");
    tr.innerHTML =
      "<td>"+r.code+"</td>"+
      "<td>"+buildDuplicateText(r.occ)+"</td>"+
      "<td>"+(r.suffix || "")+"</td>";
    tbody.appendChild(tr);
  });

  renderSuffix(uniqueList);
}

function renderSuffix(uniqueList){
  const map = {}; // suffix -> [codes]
  uniqueList.forEach(r => {
    const s = r.suffix;
    if(!s) return;
    if(!map[s]) map[s] = [];
    map[s].push(r.code);
  });

  const suffixes = Object.keys(map).sort();
  const table = document.getElementById("suffix");

  if(!suffixes.length){
    table.innerHTML = "<tr><th>No data</th></tr><tr><td>Scan first code</td></tr>";
    return;
  }

  let max = 0;
  suffixes.forEach(s => { if(map[s].length > max) max = map[s].length; });

  let html = "<tr>";
  suffixes.forEach(s => { html += "<th>"+s+"</th>"; });
  html += "</tr>";

  for(let i=0;i<max;i++){
    html += "<tr>";
    suffixes.forEach(s => {
      html += "<td>"+(map[s][i] || "")+"</td>";
    });
    html += "</tr>";
  }

  table.innerHTML = html;
}

/*** BUTTONS ***/
function clearAll(){
  if(confirm("Delete all scans?")){
    history = [];
    byCode = {};
    render();
    save();
    input.focus();
  }
}

// download unique table as CSV (Excel friendly)
function download(){
  let csv = "Code,Duplicate,Suffix\n";

  const uniqueList = Object.values(byCode).sort((a,b) => {
    const al = a.occ[a.occ.length - 1];
    const bl = b.occ[b.occ.length - 1];
    return bl - al;
  });

  uniqueList.forEach(r => {
    const dup = buildDuplicateText(r.occ);
    const line = [r.code, dup, r.suffix || ""].map(x => {
      const s = String(x).replace(/"/g,'""');
      return /[,"\n]/.test(s) ? `"${s}"` : s;
    }).join(",");
    csv += line + "\n";
  });

  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "scans.csv";
  a.click();
}

/*** SYNC BETWEEN DEVICES (EXPORT/IMPORT) ***/
function exportJSON(){
  const payload = {
    v: 1,
    history,
    byCode
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "scannerData.json";
  a.click();
}

function importJSON(){
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = "application/json,.json";
  inp.onchange = () => {
    const file = inp.files && inp.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const obj = JSON.parse(reader.result);
        if(!obj || !obj.history || !obj.byCode) throw new Error("Bad file");
        history = obj.history || [];
        byCode = obj.byCode || {};
        render();
        save();
        input.focus();
      }catch(e){
        alert("Invalid JSON file");
      }
    };
    reader.readAsText(file);
  };
  inp.click();
}

/*** STORAGE ***/
function save(){
  localStorage.setItem("scannerData_v2", JSON.stringify({ history, byCode }));
}
function load(){
  const data = localStorage.getItem("scannerData_v2");
  if(data){
    try{
      const obj = JSON.parse(data) || {};
      history = obj.history || [];
      byCode = obj.byCode || {};
    }catch{
      history = [];
      byCode = {};
    }
  }
}

/*** INIT ***/
load();
render();
input.focus();
</script>

</body>
</html>
