<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner Sheet</title>

<style>
body{font-family:Arial;background:#f3f4f6;margin:20px;}
table{border-collapse:collapse;width:100%;background:white;}
td,th{border:1px solid #ddd;padding:8px;text-align:left;}
th{background:#f1f1f1;}
button{padding:10px;margin:10px 0;font-size:16px;}
input{padding:10px;font-size:16px;width:300px;}
</style>
</head>

<body>

<h2>Scanner Sheet</h2>

<input id="scanInput" placeholder="scan here" autocomplete="off" autocapitalize="off" spellcheck="false">
<br>

<button onclick="clearAll()">Clear All</button>
<button onclick="download()">Download Excel</button>

<h3>Main Table</h3>
<table id="main">
  <thead>
    <tr>
      <th>Code</th>
      <th>Duplicate</th>
      <th>Suffix</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<h3>Suffix Table</h3>
<table id="suffix"></table>

<script>
const MIN_LEN = 9;
const END_DELAY = 260;

let rows = [];

const input = document.getElementById("scanInput");

let timer = null;
let lastValue = "";

/*** BEEPS ***/
function beep(freq, dur){
  try{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.frequency.value = freq;
    gain.gain.value = 0.08;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur);
    osc.onended = () => ctx.close();
  }catch(e){}
}
function beepOk(){ beep(900, 0.09); }
function beepDuplicate(){ beep(200, 0.22); }

/*** HELPERS ***/
function normalize(code){
  return (code || "").trim().replace(/\s+/g, "").toUpperCase();
}

function valid(code){
  if(code.length < MIN_LEN) return false;
  if(!/^[A-Z0-9]+$/.test(code)) return false;
  return true;
}

function getSuffix(code){
  // RD stays RD
  if(code.endsWith("RD")) return "RD";

  // RA without number → treat as RA1
  if(code.endsWith("RA")) return "RA1";

  // normal suffix like MR1 RB3
  const s = code.slice(-3);
  if(/^[A-Z]{2}[0-9]$/.test(s)) return s;

  return "";
}

/*** CORE ***/
function processScan(raw){
  const code = normalize(raw);
  if(!valid(code)) return;

  const existingIndex = rows.findIndex(r => r.code === code); // before insert
  const suffix = getSuffix(code);

  let dup = "";
  if(existingIndex !== -1){
    // oldIndex shifts down by 1 after unshift => sheet row is oldIndex+2
    dup = "exists in A" + (existingIndex + 2);
  }

  rows.unshift({ code, dup, suffix });

  render();
  save();

  if(existingIndex !== -1) beepDuplicate();
  else beepOk();
}

/*** INPUT CAPTURE (NO ENTER) ***/
input.addEventListener("input", () => {
  lastValue = input.value;

  clearTimeout(timer);
  timer = setTimeout(() => {
    if(input.value !== lastValue) return;

    const v = input.value;
    input.value = "";
    lastValue = "";
    processScan(v);
  }, END_DELAY);
});

// If Enter happens sometimes
input.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){
    e.preventDefault();
    clearTimeout(timer);
    const v = input.value;
    input.value = "";
    lastValue = "";
    processScan(v);
  }
});

/*** RENDER ***/
function render(){
  // Main table
  const tbody = document.querySelector("#main tbody");
  tbody.innerHTML = "";

  rows.forEach(r => {
    const tr = document.createElement("tr");
    tr.innerHTML =
      "<td>"+r.code+"</td>"+
      "<td>"+(r.dup || "")+"</td>"+
      "<td>"+(r.suffix || "")+"</td>";
    tbody.appendChild(tr);
  });

  renderSuffix();
}

function renderSuffix(){
  // unique codes only (no duplicates in suffix table)
  const map = {};
  const seen = new Set();

  rows.forEach(r => {
    if(seen.has(r.code)) return;
    seen.add(r.code);

    const s = r.suffix;
    if(!s) return;

    if(!map[s]) map[s] = [];
    map[s].push(r.code);
  });

  const suffixes = Object.keys(map).sort();
  const table = document.getElementById("suffix");

  if(!suffixes.length){
    table.innerHTML = "<tr><th>No data</th></tr><tr><td>Scan first code</td></tr>";
    return;
  }

  let max = 0;
  suffixes.forEach(s => { if(map[s].length > max) max = map[s].length; });

  let html = "<tr>";
  suffixes.forEach(s => { html += "<th>"+s+"</th>"; });
  html += "</tr>";

  for(let i=0;i<max;i++){
    html += "<tr>";
    suffixes.forEach(s => {
      html += "<td>"+(map[s][i] || "")+"</td>";
    });
    html += "</tr>";
  }

  table.innerHTML = html;
}

/*** BUTTONS ***/
function clearAll(){
  if(confirm("Delete all scans?")){
    rows = [];
    render();
    save();
    input.focus();
  }
}

function download(){
  let csv = "Code,Duplicate,Suffix\n";

  rows.forEach(r => {
    const line = [r.code, r.dup || "", r.suffix || ""].map(x => {
      const s = String(x).replace(/"/g,'""');
      return /[,"\n]/.test(s) ? `"${s}"` : s;
    }).join(",");
    csv += line + "\n";
  });

  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "scans.csv";
  a.click();
}

/*** STORAGE ***/
function save(){
  localStorage.setItem("scannerData", JSON.stringify(rows));
}
function load(){
  const data = localStorage.getItem("scannerData");
  if(data){
    try{ rows = JSON.parse(data) || []; }
    catch{ rows = []; }
  }
}

/*** INIT ***/
load();
render();
input.focus();
</script>

</body>
</html>
